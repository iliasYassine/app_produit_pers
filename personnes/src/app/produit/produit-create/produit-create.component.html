

 <form (ngSubmit)="createProduit()">
    <div>
        <label for="nomprod">Nom produit :</label>
        <input type="text" id="nomprod" [(ngModel)]="produit.nomProd" name="nomprod" required>
    </div>

    <div>
        <label for="prixAchat">Prix d'achat :</label>
        <input type="number" id="prixAchat" [(ngModel)]="produit.prixAchat" name="prixAchat" required>
    </div>

    <div>
        <label for="prixVente">Prix de vente :</label>
        <input type="number" id="prixVente" [(ngModel)]="produit.prixVente" name="prixVente" required>
    </div>

    <div>
        <label for="qte">Quantité :</label>
        <input type="number" id="qte" [(ngModel)]="produit.qte" name="qte" required>
    </div>

    <div>
        <label for="nomFournisseur">Fournisseur id :</label>
        <input type="number" id="nomFournisseur" [(ngModel)]="produit.fournisseur_id" name="nomFournisseur" required>
    </div>

    <div>
        <label for="code_barre">Code barre:</label>
        <input type="text" id="telFournisseur" [(ngModel)]="produit.codeBarre" name="code_barre" required>
    </div>

   

    <button type="submit">Créer Produit</button>
</form>
