<div class="table-container">
  <h1>Liste des produits du magasin</h1>

  <table class="styled-table" *ngIf="produit?.length">
    <thead>
      <tr>
        <th>Nom du Produit</th>
        <th>Prix d'Achat</th>
        <th>Prix de Vente</th>
        <th>Quantité</th>
        <th>Code Barre</th>
        <th>Fournisseur ID</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let prod of produit">
        <td>{{ prod.nomProd }}</td>
        <td>{{ prod.prixAchat }}</td>
        <td>{{ prod.prixVente }}</td>
        <td>{{ prod.qte }}</td>
        <td>{{ prod.codeBarre }}</td>
        <td>{{ prod.fournisseur_id }}</td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!produit?.length" class="no-data">Aucun produit trouvé.</p>
</div>
