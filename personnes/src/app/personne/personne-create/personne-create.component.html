<form (ngSubmit)="createPersonne()">
  <div>
    <label for="name">Nom :</label>
    <input type="text" id="name" [(ngModel)]="personne.name" name="name" required>
  </div>

  <div>
    <label for="prenom">Prénom :</label>
    <input type="text" id="prenom" [(ngModel)]="personne.prenom" name="prenom" required>
  </div>

  <div>
    <label for="tel">Téléphone :</label>
    <input type="text" id="tel" [(ngModel)]="personne.tel" name="tel" required>
  </div>

  <!-- Ajoutez ici d'autres champs pour les propriétés de `User` -->

  <button type="submit">Créer Personne</button>
</form>
