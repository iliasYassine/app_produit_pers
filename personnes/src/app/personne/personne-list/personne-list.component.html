<div class="min-h-screen bg-zinc-950 p-3 sm:p-6">

  <!-- Header -->
  <div class="mb-6 flex flex-wrap items-center gap-3">
    <div>
      <h1 class="text-white text-xl font-bold">Salariés</h1>
      <p class="text-zinc-600 text-xs mt-0.5">{{ personnes.length }} personne(s) dans l'équipe</p>
    </div>
    <div class="ml-auto flex flex-wrap items-center gap-2">
      <input
        type="text"
        [(ngModel)]="search"
        (input)="applyFilter()"
        placeholder="Rechercher..."
        class="bg-zinc-900 border border-white/10 text-white placeholder-zinc-600 px-4 py-2 rounded-xl text-sm focus:outline-none focus:border-violet-500/50 w-40 sm:w-52 transition-all"
      />
      <button
        (click)="toggleAddForm()"
        class="flex items-center gap-2 px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white rounded-xl text-sm font-semibold transition-all active:scale-95 shadow-lg shadow-violet-600/20"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        {{ showAddForm ? 'Fermer' : 'Ajouter' }}
      </button>
    </div>
  </div>

  <!-- Add Form -->
  <div *ngIf="showAddForm" class="bg-zinc-900 border border-white/[0.07] rounded-2xl p-4 sm:p-6 mb-6">
    <div class="flex items-center gap-2 mb-5">
      <div class="w-1.5 h-5 bg-violet-500 rounded-full"></div>
      <h2 class="text-white font-semibold text-sm">Nouveau salarié</h2>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div>
        <label class="text-zinc-500 text-xs mb-1.5 block">Nom *</label>
        <input type="text" [(ngModel)]="newPersonne.name" placeholder="Dupont"
          class="w-full bg-zinc-800 border border-white/10 text-white placeholder-zinc-600 px-3 py-2.5 rounded-xl text-sm focus:outline-none focus:border-violet-500/60 transition-all"/>
      </div>
      <div>
        <label class="text-zinc-500 text-xs mb-1.5 block">Prénom *</label>
        <input type="text" [(ngModel)]="newPersonne.prenom" placeholder="Jean"
          class="w-full bg-zinc-800 border border-white/10 text-white placeholder-zinc-600 px-3 py-2.5 rounded-xl text-sm focus:outline-none focus:border-violet-500/60 transition-all"/>
      </div>
      <div>
        <label class="text-zinc-500 text-xs mb-1.5 block">Téléphone</label>
        <input type="text" [(ngModel)]="newPersonne.tel" placeholder="06 12 34 56 78"
          class="w-full bg-zinc-800 border border-white/10 text-white placeholder-zinc-600 px-3 py-2.5 rounded-xl text-sm focus:outline-none focus:border-violet-500/60 transition-all"/>
      </div>
    </div>
    <div class="flex gap-3 mt-5 pt-5 border-t border-white/[0.06]">
      <button (click)="create()" class="px-6 py-2.5 bg-violet-600 hover:bg-violet-500 text-white rounded-xl text-sm font-semibold transition-all active:scale-95">
        Créer le salarié
      </button>
      <button (click)="showAddForm = false" class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white rounded-xl text-sm transition-all">
        Annuler
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center py-20">
    <div class="w-6 h-6 border-2 border-violet-500 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="bg-zinc-900 border border-white/[0.07] rounded-2xl overflow-hidden">
    <!-- Empty state -->
    <div *ngIf="filtered.length === 0" class="flex flex-col items-center justify-center py-20 text-center">
      <div class="w-14 h-14 bg-zinc-800 rounded-2xl flex items-center justify-center mb-4 border border-white/5">
        <svg class="w-6 h-6 text-zinc-700" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </div>
      <p class="text-zinc-500 font-medium">Aucun salarié trouvé</p>
    </div>

    <!-- Scrollable table wrapper -->
    <div *ngIf="filtered.length > 0" class="overflow-x-auto">
      <div class="min-w-[480px]">
        <!-- Table header -->
        <div class="grid grid-cols-[1fr_1fr_1fr_auto] border-b border-white/[0.06] px-5 py-3">
          <span class="text-zinc-600 text-xs font-medium uppercase tracking-wider">Nom</span>
          <span class="text-zinc-600 text-xs font-medium uppercase tracking-wider">Prénom</span>
          <span class="text-zinc-600 text-xs font-medium uppercase tracking-wider">Téléphone</span>
          <span class="text-zinc-600 text-xs font-medium uppercase tracking-wider w-36 text-right">Actions</span>
        </div>

        <!-- Rows -->
        <div *ngFor="let p of filtered; let last = last"
          class="border-b border-white/[0.04]"
          [class.border-b-0]="last"
          [style.background]="deleteId === p.id ? 'rgba(239,68,68,0.05)' : editId === p.id ? 'rgba(245,158,11,0.05)' : ''"
        >
          <!-- Normal / Edit row -->
          <div *ngIf="deleteId !== p.id" class="grid grid-cols-[1fr_1fr_1fr_auto] px-5 py-3.5 items-center">
            <ng-container *ngIf="editId !== p.id">
              <span class="text-white text-sm font-medium">{{ p.name }}</span>
              <span class="text-zinc-300 text-sm">{{ p.prenom }}</span>
              <span class="text-zinc-400 text-sm">{{ p.tel || '—' }}</span>
              <div class="flex gap-2 justify-end w-36">
                <button (click)="startEdit(p)"
                  class="px-3 py-1.5 bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 rounded-lg text-xs font-medium transition-all">
                  Modifier
                </button>
                <button (click)="askDelete(p.id!)"
                  class="px-3 py-1.5 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 rounded-lg text-xs font-medium transition-all">
                  Suppr.
                </button>
              </div>
            </ng-container>

            <ng-container *ngIf="editId === p.id">
              <input type="text" [(ngModel)]="editData.name" placeholder="Nom"
                class="bg-zinc-800 border border-amber-500/40 text-white px-2.5 py-1.5 rounded-lg text-sm focus:outline-none mr-2"/>
              <input type="text" [(ngModel)]="editData.prenom" placeholder="Prénom"
                class="bg-zinc-800 border border-amber-500/40 text-white px-2.5 py-1.5 rounded-lg text-sm focus:outline-none mr-2"/>
              <input type="text" [(ngModel)]="editData.tel" placeholder="Tél."
                class="bg-zinc-800 border border-amber-500/40 text-white px-2.5 py-1.5 rounded-lg text-sm focus:outline-none mr-2"/>
              <div class="flex gap-2 justify-end w-36">
                <button (click)="saveEdit()"
                  class="px-3 py-1.5 bg-amber-500 hover:bg-amber-400 text-zinc-950 rounded-lg text-xs font-bold transition-all">
                  Sauv.
                </button>
                <button (click)="cancelEdit()"
                  class="px-3 py-1.5 bg-zinc-700 hover:bg-zinc-600 text-zinc-300 rounded-lg text-xs transition-all">
                  ✕
                </button>
              </div>
            </ng-container>
          </div>

          <!-- Delete confirmation -->
          <div *ngIf="deleteId === p.id" class="px-5 py-3.5 flex flex-wrap items-center gap-3">
            <span class="text-rose-400 text-sm flex-1 min-w-0">Supprimer <span class="font-semibold">{{ p.name }} {{ p.prenom }}</span> ?</span>
            <div class="flex gap-2">
              <button (click)="doDelete(p.id!)"
                class="px-4 py-1.5 bg-rose-500 hover:bg-rose-400 text-white rounded-lg text-xs font-bold transition-all">
                Confirmer
              </button>
              <button (click)="cancelDelete()"
                class="px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 rounded-lg text-xs transition-all">
                Annuler
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
