<div class="min-h-screen bg-zinc-950 text-zinc-100 p-4 sm:p-6">
  <div class="max-w-3xl mx-auto">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
      <div class="w-9 h-9 rounded-xl bg-orange-500/10 border border-orange-500/20 flex items-center justify-center">
        <svg class="w-5 h-5 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold text-white">Frais généraux</h1>
        <p class="text-xs text-zinc-500">Essence, achats, divers…</p>
      </div>
      <div class="ml-auto bg-zinc-900 border border-white/10 rounded-xl px-4 py-2 text-right">
        <p class="text-xs text-zinc-500">Total</p>
        <p class="text-lg font-bold text-orange-400">{{ totalFrais | number:'1.2-2' }} €</p>
      </div>
    </div>

    <!-- Formulaire ajout -->
    <div class="bg-zinc-900 border border-white/10 rounded-2xl p-5 mb-6">
      <h2 class="text-sm font-semibold text-zinc-300 mb-4">Ajouter un frais</h2>

      <div *ngIf="errorMsg" class="mb-3 text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-3 py-2">
        {{ errorMsg }}
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
        <div>
          <label class="block text-xs text-zinc-500 mb-1">Nom du frais *</label>
          <input
            [(ngModel)]="newNom"
            placeholder="ex: Essence, Fournitures…"
            class="w-full bg-zinc-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-orange-500/50"
          />
        </div>
        <div>
          <label class="block text-xs text-zinc-500 mb-1">Prix (€) *</label>
          <input
            type="number"
            [(ngModel)]="newPrix"
            min="0"
            step="0.01"
            placeholder="0.00"
            class="w-full bg-zinc-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-orange-500/50"
          />
        </div>
      </div>

      <div class="mb-3">
        <label class="block text-xs text-zinc-500 mb-1">Description (optionnel)</label>
        <textarea
          [(ngModel)]="newDescription"
          rows="2"
          placeholder="Détails du frais…"
          class="w-full bg-zinc-800 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-orange-500/50 resize-none"
        ></textarea>
      </div>

      <div class="mb-4">
        <label class="block text-xs text-zinc-500 mb-1">Ticket / Facture (optionnel)</label>
        <input
          id="ticketInput"
          type="file"
          accept="image/*,application/pdf"
          (change)="onFileChange($event)"
          class="w-full text-sm text-zinc-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-medium file:bg-orange-500/10 file:text-orange-400 hover:file:bg-orange-500/20 cursor-pointer"
        />
        <p *ngIf="newTicketFile" class="text-xs text-zinc-500 mt-1">{{ newTicketFile.name }}</p>
      </div>

      <button
        (click)="add()"
        class="w-full py-2.5 bg-orange-500 hover:bg-orange-400 text-white rounded-xl text-sm font-semibold transition-all active:scale-95"
      >
        Ajouter le frais
      </button>
    </div>

    <!-- Liste -->
    <div class="space-y-3">
      <p *ngIf="fraisList.length === 0" class="text-center text-sm text-zinc-600 py-10">
        Aucun frais enregistré.
      </p>

      <div
        *ngFor="let f of fraisList"
        [ngClass]="deleteConfirmId === f.id
          ? 'bg-zinc-900 border border-red-500 bg-red-950 rounded-2xl p-4 transition-colors'
          : 'bg-zinc-900 border border-zinc-800 rounded-2xl p-4 transition-colors'"
      >
        <div class="flex items-start justify-between gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-0.5">
              <span class="font-semibold text-white text-sm">{{ f.nom }}</span>
              <span class="text-xs text-zinc-500">{{ f.date }}</span>
            </div>
            <p *ngIf="f.description" class="text-xs text-zinc-400 mb-2">{{ f.description }}</p>

            <!-- Ticket -->
            <a
              *ngIf="f.ticket"
              [href]="ticketUrl(f.ticket)"
              target="_blank"
              rel="noopener"
              class="inline-flex items-center gap-1.5 text-xs text-orange-400 hover:text-orange-300 transition-colors"
            >
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
              </svg>
              Voir le ticket
            </a>
          </div>

          <div class="flex items-center gap-3 flex-shrink-0">
            <span class="text-base font-bold text-orange-400">{{ f.prix | number:'1.2-2' }} €</span>

            <div *ngIf="deleteConfirmId !== f.id">
              <button
                (click)="confirmDelete(f.id!)"
                class="p-1.5 text-zinc-500 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors"
                title="Supprimer"
              >
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>

            <div *ngIf="deleteConfirmId === f.id" class="flex items-center gap-2">
              <span class="text-xs text-red-400">Supprimer ?</span>
              <button (click)="deleteFrais(f.id!)" class="px-2.5 py-1 bg-red-500 hover:bg-red-400 text-white text-xs font-medium rounded-lg transition-colors">Oui</button>
              <button (click)="cancelDelete()" class="px-2.5 py-1 bg-zinc-700 hover:bg-zinc-600 text-zinc-200 text-xs font-medium rounded-lg transition-colors">Non</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
