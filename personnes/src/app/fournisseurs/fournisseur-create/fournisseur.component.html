<form (ngSubmit)="createFournisseur()">
    <div>
      <label for="nom">Nom :</label>
      <input type="text" id="nom" [(ngModel)]="fournisseur.nom" name="nom" required>
    </div>
  
    <div>
      <label for="tel">Téléphone :</label>
      <input type="tel" id="tel" [(ngModel)]="fournisseur.tel" name="tel" required>
    </div>
    <div>
        <label for="adresse">Adresse :</label>
        <input type="text" id="adresse" [(ngModel)]="fournisseur.adresse" name="adresse" required>
      </div>
  
      <div>
        <label for="email">Email :</label>
        <input type="email" id="email" [(ngModel)]="fournisseur.email" name="email" required>
      </div>
    <!-- Ajoutez ici d'autres champs pour les propriétés de `User` -->
  
    <button type="submit">Créer Fournisseur</button>
  </form>
