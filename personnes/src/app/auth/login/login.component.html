<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white border border-slate-200 shadow-sm rounded-2xl p-8 text-center">
    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-violet-500/30">
      <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-slate-900 mb-1">CaisseIH</h1>
    <p class="text-slate-400 text-sm mb-6">Connectez-vous pour accéder à l'application</p>

    <div id="google-btn" class="flex justify-center"></div>

    <p *ngIf="loading" class="text-slate-400 text-xs mt-4">Connexion en cours...</p>
    <p *ngIf="errorMsg" class="text-rose-600 text-xs mt-4 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">{{ errorMsg }}</p>
  </div>
</div>
