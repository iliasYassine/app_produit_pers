# ============================================================
# Configuration Nginx pour caisse-ih.com
# Serveur VPS — Django (Gunicorn) + Angular (statique)
# ============================================================
#
# INSTALLATION SUR VPS :
#   1. Copier ce fichier vers /etc/nginx/sites-available/caisse-ih
#   2. Créer le symlink : ln -s /etc/nginx/sites-available/caisse-ih /etc/nginx/sites-enabled/
#   3. Tester : nginx -t
#   4. Recharger : systemctl reload nginx
#
# FRONTEND BUILD :
#   cd personnes && npm install && ng build --configuration=production
#   Copier dist/personnes/browser/ vers /var/www/caisse-ih/
#
# BACKEND DJANGO :
#   pip install gunicorn
#   gunicorn --workers 3 --bind 127.0.0.1:8000 myproject.wsgi:application
#   (ou utiliser le service systemd ci-dessous)
#
# ============================================================

server {
    listen 80;
    server_name caisse-ih.com www.caisse-ih.com;

    # Redirection HTTPS (décommenter après avoir configuré SSL avec certbot)
    # return 301 https://$host$request_uri;

    # --- Frontend Angular (fichiers statiques buildés) ---
    root /var/www/caisse-ih;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API Django via Gunicorn ---
    location /transcript/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Fichiers statiques Django (après python manage.py collectstatic) ---
    location /static/ {
        alias /var/www/caisse-ih-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # --- Fichiers media (photos produits) ---
    location /media/ {
        alias /var/www/caisse-ih-backend/media/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Logs
    access_log /var/log/nginx/caisse-ih-access.log;
    error_log  /var/log/nginx/caisse-ih-error.log;
}

