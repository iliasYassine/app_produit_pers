# ============================================================
# Configuration Nginx pour app_produit_pers
# Serveur VPS — Django (Gunicorn port 8001) + Angular (statique)
# ============================================================
#
# INSTALLATION SUR VPS :
#   1. sudo cp nginx.conf /etc/nginx/sites-available/caisse-app
#   2. sudo ln -s /etc/nginx/sites-available/caisse-app /etc/nginx/sites-enabled/
#   3. sudo nginx -t
#   4. sudo systemctl reload nginx
#
# FRONTEND BUILD :
#   cd personnes && npm install && ng build --configuration=production
#   sudo cp -r dist/personnes/browser/* /var/www/caisse-app/
#
# BACKEND DJANGO :
#   sudo cp gunicorn.service /etc/systemd/system/caisse-app.service
#   sudo systemctl daemon-reload && sudo systemctl enable caisse-app && sudo systemctl start caisse-app
#
# ============================================================

server {
    listen 80;
    server_name TON_DOMAINE www.TON_DOMAINE;
    # Si pas de domaine, utilise l'IP : server_name TON_IP;

    # --- Frontend Angular ---
    root /var/www/caisse-app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API Django via Gunicorn (port 8001) ---
    location /transcript/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Fichiers statiques Django ---
    location /static/ {
        alias /var/www/caisse-app-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # --- Fichiers media (photos produits) ---
    location /media/ {
        alias /var/www/caisse-app-backend/media/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    access_log /var/log/nginx/caisse-app-access.log;
    error_log  /var/log/nginx/caisse-app-error.log;
}
